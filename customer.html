<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>재입고 일정 조회</title>

  <link rel="icon" type="image/png" href="favicon.ico" />

  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">

  <link rel="stylesheet" href="customer-style.css" />
</head>

<body>
  <div class="app-shell">
    <div class="inner-shell">

      <div class="header">
        <div class="header-left">
          <div class="title-wrap">
            <h1>
              재입고 일정 조회
              <span class="title-tag">Restock</span>
            </h1>
            <p class="header-desc">
              상품명 또는 컬러명을 입력하시면 현재 확인 가능한 재입고 일정을 조회하실 수 있습니다.
            </p>
          </div>
        </div>

        <div class="header-right">
          <div id="lastUpdated">검색 대기 중</div>
        </div>
      </div>

      <div class="content-row">

        <div class="card card-search">
          <div class="search-box">

            <div class="search-grid">
              <div class="input-wrap slim">
                <span class="input-icon-left" aria-hidden="true">
                  <svg class="icon-search" viewBox="0 0 24 24" fill="none">
                    <path d="M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16Z" stroke="rgba(110,106,130,.55)" stroke-width="2"/>
                    <path d="M20 20l-3.5-3.5" stroke="rgba(255,143,188,.80)" stroke-width="2" stroke-linecap="round"/>
                  </svg>
                </span>
                <input type="text" id="keyword" placeholder="상품명 또는 컬러 검색 예: 라자르 / 베이지 / BLACK" />
                <button type="button" class="clear-btn" data-clear="keyword">×</button>
              </div>

              <button type="button" id="searchButton" class="search-btn">조회</button>
            </div>

            <div class="status" id="status">
              현재 확인 가능한 재입고 일정을 조회합니다.
            </div>

          </div>
        </div>

        <div class="card result-card">
          <div class="result-header-row">
            <h2 class="card-title">조회 결과</h2>
            <div class="result-header-right" id="resultInfo">0건</div>
          </div>

          <div id="result">
            <div class="no-result">검색어를 입력하고 조회 버튼을 눌러주세요.</div>
          </div>

          <div class="notice-box">
            ※ 재입고 예정일은 생산 및 물류 상황에 따라 변동될 수 있습니다.<br>
            ※ 조회되지 않는 상품은 현재 재입고 일정이 확정되지 않았거나, 재입고 예정이 없는 상품일 수 있습니다.<br>
            ※ 재입고 예정일이 공란인 경우, 재생산 시작일로부터 약 2개월 후 입고 예정으로 참고 부탁드립니다.
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="customer-script.js"></script>
</body>
</html>
